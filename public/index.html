<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nmap - Network Mapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .terminal-bg { background-color: #1a1a1a; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto border border-zinc-800 rounded-lg overflow-hidden shadow-2xl">
        <!-- Header -->
        <div class="bg-[#2d2d2d] p-3 flex items-center justify-between border-b border-zinc-700">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-4 text-xs font-mono text-zinc-400">Nmap - Network Mapper</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row">
            <!-- Sidebar Controls -->
            <div class="w-full md:w-64 p-6 border-r border-zinc-800 space-y-6">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Target IP / Domain</label>
                    <input id="target" type="text" placeholder="188.65.124.92" class="w-full mt-2 bg-black border border-zinc-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                </div>
                
                <button onclick="startScan()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded flex items-center justify-center gap-2 transition">
                    <span>▶</span> Scan
                </button>

                <div class="pt-4 border-t border-zinc-800">
                    <p class="text-[10px] uppercase text-zinc-500 font-bold">Target Status</p>
                    <div class="flex items-center gap-2 mt-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-sm text-zinc-300">Available</span>
                    </div>
                </div>
            </div>

            <!-- Terminal Output -->
            <div class="flex-1 p-6 bg-black min-h-[400px] font-mono text-sm leading-relaxed overflow-y-auto">
                <pre id="output" class="whitespace-pre-wrap text-zinc-300">Ready for scan...</pre>
            </div>
        </div>
    </div>

    <script>
        async function startScan() {
            const target = document.getElementById('target').value;
            const output = document.getElementById('output');
            if(!target) return alert("Please enter a target");

            output.innerHTML = `Starting Nmap scan on ${target}...\n\nScanning in progress...`;

            try {
                const response = await fetch(`/api/scan?target=${target}`);
                const data = await response.json();
                output.innerHTML = data.result;
            } catch (err) {
                output.innerHTML = "Error: Could not connect to backend.";
            }
        }
    </script>
</body>
</html>
